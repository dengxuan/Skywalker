name: Changelog Check

on:
  pull_request:
    branches:
      - main
      - release/2.0

permissions:
  contents: read
  pull-requests: read

jobs:
  changelog-check:
    name: Changelog check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate changelog entry
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const exempt = /No changelog needed/i.test(body);
            const { owner, repo } = context.repo;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const changed = files.map(file => file.filename);
            const hasChangelog = changed.includes('CHANGELOG.md');
            const userVisible = changed.some(file => {
              if (file === 'CHANGELOG.md') return false;
              if (file.startsWith('src/')) return true;
              if (file.startsWith('samples/')) return true;
              if (file.startsWith('templates/')) return true;
              if (file.startsWith('docs/api/')) return true;
              if (file === 'README.md') return true;
              return false;
            });

            if (userVisible && !hasChangelog && !exempt) {
              core.setFailed([
                'User-visible changes must update CHANGELOG.md [Unreleased].',
                'If this PR truly has no user-visible impact, add "No changelog needed" to the PR description with a short reason.',
              ].join('\n'));
            }